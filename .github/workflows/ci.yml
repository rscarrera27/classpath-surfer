name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --test unit

      - name: Doc tests
        run: cargo test --doc

      - name: Check docs build
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  integration:
    name: Integration (JDK 21, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set JAVA_21_HOME
        run: echo "JAVA_21_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Integration tests
        run: cargo test --test integration --test integration_mutation --test cli

  matrix:
    name: Matrix (JDK ${{ matrix.jdk }}, Gradle ${{ matrix.gradle }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            jdk: 17
            gradle: "7.6.4"
          - os: ubuntu-latest
            jdk: 21
            gradle: "8.14"
          - os: macos-latest
            jdk: 17
            gradle: "7.6.4"
          - os: macos-latest
            jdk: 21
            gradle: "8.14"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - name: Set JAVA version-specific HOME
        run: echo "JAVA_${{ matrix.jdk }}_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install protoc (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Matrix tests
        run: cargo test --test matrix -- --test-threads=1
